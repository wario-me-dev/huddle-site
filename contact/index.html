<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — Huddle</title>
  <style>*{box-sizing:border-box;margin:0;padding:0;}</style>
</head>
<body>
<div style="background:#0b0b0b;color:#efefef;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;">
  <nav style="display:flex;align-items:center;justify-content:space-between;padding:22px 48px;border-bottom:1px solid rgba(255,255,255,0.06);">
    <a href="/"><img src="/Huddle.png" alt="Huddle" style="height:32px;width:auto;" /></a>
    <div style="display:flex;gap:32px;">
      <a href="/blog/" style="color:#555;font-size:0.85rem;text-decoration:none;font-weight:500;">Blog</a>
      <a href="/" style="color:#555;font-size:0.85rem;text-decoration:none;font-weight:500;">Download</a>
    </div>
  </nav>
  <div style="max-width:660px;margin:0 auto;padding:56px 24px 96px;">
    <h1 style="font-size:2.4rem;font-weight:900;letter-spacing:-0.04em;line-height:1.05;color:#f0f0f0;margin:0 0 16px;">Contact Us</h1>
    <p style="font-size:0.92rem;color:#555;line-height:1.8;margin:0 0 40px;">Have a question, a report, or just want to say hello? Fill in the form below and we'll get back to you as soon as we can.</p>
    <form action="https://formspree.io/f/hello@huddle.so" method="POST" style="display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;flex-direction:column;gap:7px;">
        <label style="font-size:0.75rem;font-weight:600;color:#383838;letter-spacing:0.05em;text-transform:uppercase;">Name</label>
        <input name="name" type="text" placeholder="Your name" required style="background:#0f0f0f;border:1px solid rgba(255,255,255,0.08);border-radius:11px;padding:13px 16px;font-size:0.88rem;color:#efefef;outline:none;font-family:inherit;" />
      </div>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <label style="font-size:0.75rem;font-weight:600;color:#383838;letter-spacing:0.05em;text-transform:uppercase;">Email</label>
        <input name="email" type="email" placeholder="your@email.com" required style="background:#0f0f0f;border:1px solid rgba(255,255,255,0.08);border-radius:11px;padding:13px 16px;font-size:0.88rem;color:#efefef;outline:none;font-family:inherit;" />
      </div>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <label style="font-size:0.75rem;font-weight:600;color:#383838;letter-spacing:0.05em;text-transform:uppercase;">Message</label>
        <textarea name="message" placeholder="What's on your mind?" required rows="5" style="background:#0f0f0f;border:1px solid rgba(255,255,255,0.08);border-radius:11px;padding:13px 16px;font-size:0.88rem;color:#efefef;outline:none;resize:vertical;font-family:inherit;"></textarea>
      </div>
      <div>
        <button type="submit" style="margin-top:8px;padding:13px 28px;border-radius:11px;background:linear-gradient(135deg,#fd6a00,#ffcd00);color:#000;font-weight:800;font-size:0.88rem;letter-spacing:-0.01em;cursor:pointer;border:none;font-family:inherit;">Send message</button>
      </div>
    </form>
  </div>
  <footer style="padding:24px 48px;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <img src="/Huddle.png" alt="Huddle" style="height:24px;width:auto;" />
    <div style="display:flex;gap:22px;flex-wrap:wrap;align-items:center;">
      <a href="/blog/" style="color:#383838;font-size:0.76rem;text-decoration:none;">Blog</a>
      <a href="/guidelines/" style="color:#383838;font-size:0.76rem;text-decoration:none;">Guidelines</a>
      <a href="/privacy/" style="color:#383838;font-size:0.76rem;text-decoration:none;">Privacy</a>
      <a href="/terms/" style="color:#383838;font-size:0.76rem;text-decoration:none;">Terms</a>
      <a href="/contact/" style="color:#383838;font-size:0.76rem;text-decoration:none;">Contact</a>
    </div>
    <span style="color:#2a2a2a;font-size:0.7rem;">© 2026 Huddle</span>
  </footer>
</div>
</body>
</html>
